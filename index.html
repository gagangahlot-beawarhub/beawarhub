<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <style>
        /* CSS for Styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #333; }
        input[type="date"] {
            width: 100%;
            padding: 10px;
            margin: 20px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover { background-color: #0056b3; }
        #result {
            margin-top: 20px;
            font-weight: bold;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Age Calculator</h2>
    <input type="date" id="dob">
    <button onclick="calculateAge()">Calculate Age</button>
    <div id="result"></div>
</div>

<script>
    // JavaScript for Logic
    function calculateAge() {
        const birthDateInput = document.getElementById('dob').value;
        const resultDiv = document.getElementById('result');

        if (!birthDateInput) {
            resultDiv.innerHTML = "Please select a date first!";
            return;
        }

        const birthDate = new Date(birthDateInput);
        const today = new Date();

        let years = today.getFullYear() - birthDate.getFullYear();
        let months = today.getMonth() - birthDate.getMonth();
        let days = today.getDate() - birthDate.getDate();

        // Agar current month birth month se pehle hai, ya same month mein date choti hai
        if (months < 0 || (months === 0 && days < 0)) {
            years--;
            months += 12;
        }

        if (days < 0) {
            const lastMonth = new Date(today.getFullYear(), today.getMonth(), 0);
            days += lastMonth.getDate();
            months--;
        }

        resultDiv.innerHTML = `You are <br> <span style="color:#007bff; font-size: 1.2rem;">${years} Years, ${months} Months, and ${days} Days</span> old.`;
    }
</script>

</body>
</html>
