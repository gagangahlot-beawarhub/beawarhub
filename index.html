<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Pro Age Calculator By Gagan - Calculate Exact Age Online</title>
    <meta name="description" content="Gagan's Pro Age Calculator. Apni sahi umar saal, mahine, din, hours aur seconds mein jaanein. Best tool for quick age calculation.">
    <meta name="keywords" content="Age Calculator Gagan, Age Calculator Beawar, Online Age Tool, Birthday Calculator, Exact Age in Seconds">
    <meta name="author" content="Gagan">

    <meta property="og:title" content="Pro Age Calculator By Gagan">
    <meta property="og:description" content="Check your exact age in years, months, days, and even seconds!">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #4834d4;
            --secondary: #686de0;
            --accent: #be2edd;
            --text-dark: #2d3436;
            --bg-light: #f9f9f9;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* Container Animation */
        .calculator-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 26px;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
            transition: all 0.3s;
        }

        input[type="date"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(72, 52, 212, 0.2);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(72, 52, 212, 0.3);
        }

        button:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* Results Styling */
        .results-container {
            display: none;
            margin-top: 30px;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; scale: 0.9; }
            to { opacity: 1; scale: 1; }
        }

        .main-result {
            background: #eef2ff;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            border-left: 6px solid var(--primary);
        }

        .main-result h2 {
            margin: 0;
            font-size: 22px;
            color: var(--primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #eee;
        }

        .stat-box span {
            display: block;
            font-size: 12px;
            color: #777;
            text-transform: uppercase;
        }

        .stat-box p {
            margin: 5px 0 0;
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }

        footer {
            text-align: center;
            margin-top: 25px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <h1>✨ Pro Age Calculator</h1>
        
        <div class="input-group">
            <label>Select Date of Birth</label>
            <input type="date" id="dob">
        </div>

        <div class="input-group">
            <label>Calculate Age as of (Present Date)</label>
            <input type="date" id="targetDate">
        </div>

        <button onclick="calculateAge()">Calculate Now</button>

        <div class="results-container" id="results">
            <div class="main-result">
                <span>Exact Age</span>
                <h2 id="standardAge">-</h2>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <span>Total Months</span>
                    <p id="tMonths">-</p>
                </div>
                <div class="stat-box">
                    <span>Total Weeks</span>
                    <p id="tWeeks">-</p>
                </div>
                <div class="stat-box">
                    <span>Total Days</span>
                    <p id="tDays">-</p>
                </div>
                <div class="stat-box">
                    <span>Total Hours</span>
                    <p id="tHours">-</p>
                </div>
                <div class="stat-box">
                    <span>Total Minutes</span>
                    <p id="tMinutes">-</p>
                </div>
                <div class="stat-box">
                    <span>Total Seconds</span>
                    <p id="tSeconds">-</p>
                </div>
            </div>
        </div>

        <footer>Developed by Gagan</footer>
    </div>

    <script>
        // Set default date to today
        document.getElementById('targetDate').valueAsDate = new Date();

        function calculateAge() {
            const dobInput = document.getElementById('dob').value;
            const targetInput = document.getElementById('targetDate').value;

            if (!dobInput || !targetInput) {
                alert("Pahle dates select karein!");
                return;
            }

            const dob = new Date(dobInput);
            const target = new Date(targetInput);

            if (dob > target) {
                alert("Birth date, present date se badi nahi ho sakti!");
                return;
            }

            // Standard Age Logic
            let years = target.getFullYear() - dob.getFullYear();
            let months = target.getMonth() - dob.getMonth();
            let days = target.getDate() - dob.getDate();

            if (months < 0 || (months === 0 && days < 0)) {
                years--;
                months += 12;
            }
            if (days < 0) {
                const prevMonth = new Date(target.getFullYear(), target.getMonth(), 0);
                days += prevMonth.getDate();
                months--;
            }

            // Math Logic
            const diffMs = target - dob;
            const totalSecs = Math.floor(diffMs / 1000);
            const totalMins = Math.floor(totalSecs / 60);
            const totalHrs = Math.floor(totalMins / 60);
            const totalDays = Math.floor(totalHrs / 24);
            const totalWeeks = Math.floor(totalDays / 7);
            const totalMonthsAll = (years * 12) + months;

            // Display Results
            document.getElementById('standardAge').innerText = `${years} Years, ${months} Months, ${days} Days`;
            document.getElementById('tMonths').innerText = totalMonthsAll.toLocaleString();
            document.getElementById('tWeeks').innerText = totalWeeks.toLocaleString();
            document.getElementById('tDays').innerText = totalDays.toLocaleString();
            document.getElementById('tHours').innerText = totalHrs.toLocaleString();
            document.getElementById('tMinutes').innerText = totalMins.toLocaleString();
            document.getElementById('tSeconds').innerText = totalSecs.toLocaleString();

            document.getElementById('results').style.display = 'block';
        }
    </script>
</body>
</html>
