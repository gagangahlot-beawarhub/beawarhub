<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Age Calculator</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #2d3436;
        }

        /* Container Animation */
        .calculator-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 400px;
            text-align: center;
            transform: translateY(0);
            transition: transform 0.3s ease;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .calculator-card:hover {
            transform: translateY(-5px);
        }

        h2 {
            margin-bottom: 25px;
            color: var(--primary-color);
            font-size: 24px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #636e72;
        }

        /* Styled Date Input */
        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="date"]:focus {
            border-color: var(--primary-color);
        }

        /* Animated Button */
        button {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            background: #5b4bc4;
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }

        /* Result Animation */
        #result {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            display: none; /* Initially hidden */
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-item {
            display: block;
            font-size: 18px;
            margin: 5px 0;
        }

        .highlight {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 22px;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>✨ Age Calculator</h2>
    
    <div class="input-group">
        <label for="dob">Select Birth Date</label>
        <input type="date" id="dob">
    </div>

    <button onclick="calculateAge()">Calculate Now</button>

    <div id="result">
        <span class="result-item">You are</span>
        <div id="age-text" class="highlight"></div>
        <span class="result-item">old today!</span>
    </div>
</div>

<script>
    function calculateAge() {
        const dobValue = document.getElementById('dob').value;
        const resultDiv = document.getElementById('result');
        const ageText = document.getElementById('age-text');

        if (!dobValue) {
            alert("Please select your birthday!");
            return;
        }

        const dob = new Date(dobValue);
        const now = new Date();

        let years = now.getFullYear() - dob.getFullYear();
        let months = now.getMonth() - dob.getMonth();
        let days = now.getDate() - dob.getDate();

        if (months < 0 || (months === 0 && days < 0)) {
            years--;
            months += 12;
        }
        if (days < 0) {
            const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
            days += prevMonth.getDate();
            months--;
        }

        // Display result with animation
        ageText.innerHTML = `${years} Years, ${months} Months, ${days} Days`;
        resultDiv.style.display = 'block';
        resultDiv.style.background = '#f0f3ff';
    }
</script>

</body>
</html>
